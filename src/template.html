<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Weather App</title>
  </head>

  <body>
    <h1>Weather!</h1>
    <form id="search-form">
      <input
        id="search-input"
        type="text"
        placeholder="Enter city name"
        name="city-name"
      />
      <button id="search-button" type="submit">Search</button>
    </form>
    <div class="container">
      <div class="header">
        <p class="address"></p>
        <p class="time"></p>
      </div>
      <div class="icon-temp-wrapper">
        <img class="icon" src="" />
        <p class="temperature"></p>
      </div>
      <div class="content">
        <div class="weather-detail">
          <p>Conditions</p>
          <p class="condition-data"></p>
        </div>
        <div class="weather-detail">
          <p>Feels like</p>
          <p class="feels-like-data"></p>
        </div>
        <div class="weather-detail">
          <p>Humidity</p>
          <p class="humidity-data"></p>
        </div>
        <div class="weather-detail">
          <p>Wind Gusts</p>
          <p class="wind-gusts-data"></p>
        </div>
      </div>
    </div>
  </body>
</html>
